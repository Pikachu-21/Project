<!DOCTYPE html>
<html>
<head>
    <title>Government Internship - Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001f3f 0%, #003d7a 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { color: #001f3f; text-align: center; font-family: "Playfair Display", serif; }
        p { color: #555; line-height: 1.6; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #001f3f; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%; padding: 8px; margin-bottom: 10px;
            border: 1px solid #bbb; border-radius: 4px;
            font-family: Arial, sans-serif; font-size: 14px;
        }
        button {
            background-color: #001f3f; color: white;
            padding: 10px 20px; margin-right: 10px; margin-top: 20px;
            border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        button:hover { background-color: #003d7a; }
        button.reset { background-color: #95a5a6; }
        button.reset:hover { background-color: #7f8c8d; }

        /* Message box to show success or error */
        .message {
            padding: 12px; border-radius: 4px; margin-top: 15px;
            text-align: center; font-weight: bold; display: none;
        }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error   { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .login-link { text-align: center; margin-top: 20px; color: #555; }
        .login-link a { color: #001f3f; text-decoration: none; font-weight: bold; }
        .login-link a:hover { text-decoration: underline; }
        img { display: block; margin: 0 auto 20px; width: 80px; height: auto; }
    </style>
</head>
<body>
<div class="container">
    <img src="image1.jpg" alt="State emblem of India">
    <h2><u>Internship Registration</u></h2>
    <p>Please fill in the form below to <b>create your account</b>.</p>

    <!-- Message box (hidden by default, shown after submit) -->
    <div class="message" id="message"></div>

    <!-- NOTE: We removed action="" and method="" — JavaScript handles submission now -->
    <form id="registerForm">
        <label for="fullname"><b>Full Name:</b></label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="email"><b>Email:</b></label>
        <input type="email" id="email" name="email" required>

        <label for="username"><b>Username:</b></label>
        <input type="text" id="username" name="username" required>

        <label for="password"><b>Password:</b></label>
        <input type="password" id="password" name="password" required>

        <label for="confirm"><b>Confirm Password:</b></label>
        <input type="password" id="confirm" name="confirm" required>

        <label for="domain"><b>Select Domain:</b></label>
        <select id="domain" name="domain" required>
            <option value="">-- Select your domain --</option>
            <option value="cs">Computer Science</option>
            <option value="eee">Electronics and Electrical Science</option>
            <option value="aiml">Artificial Intelligence and Machine Learning</option>
            <option value="mech">Mechanical Engineering</option>
            <option value="aero">Aerospace Engineering</option>
            <option value="science">Science and Research</option>
        </select>

        <button type="submit" id="submitBtn">Register</button>
        <button type="button" class="reset" onclick="document.getElementById('registerForm').reset()">Clear</button>
    </form>

    <div class="login-link">
        <p>Already registered? <a href="Login.html">Click here to Login</a>.</p>
    </div>
</div>

<script>
    // This script sends the form data to our backend server

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Stop the page from reloading

        const messageBox = document.getElementById('message');
        const submitBtn  = document.getElementById('submitBtn');

        // Collect form values
        const formData = {
            fullName: document.getElementById('fullname').value,
            email:    document.getElementById('email').value,
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            confirm:  document.getElementById('confirm').value,
            domain:   document.getElementById('domain').value
        };

        // Basic client-side check
        if (formData.password !== formData.confirm) {
            showMessage('Passwords do not match!', 'error');
            return;
        }

        // Disable button while waiting for server response
        submitBtn.disabled = true;
        submitBtn.textContent = 'Registering...';

        try {
            // Send the data to the backend server
            const response = await fetch('http://localhost:3000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (data.success) {
                showMessage('Registration successful! Redirecting to login...', 'success');
                setTimeout(() => { window.location.href = 'Login.html'; }, 2000);
            } else {
                showMessage(data.message, 'error');
            }

        } catch (error) {
            showMessage('Cannot connect to server. Make sure the server is running.', 'error');
        }

        submitBtn.disabled = false;
        submitBtn.textContent = 'Register';
    });

    function showMessage(text, type) {
        const box = document.getElementById('message');
        box.textContent = text;
        box.className = 'message ' + type;
        box.style.display = 'block';
    }
</script>
</body>
</html>
