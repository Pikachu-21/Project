<!DOCTYPE html>
<html>
<head>
    <title>Government Internship - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #001f3f 0%, #003d7a 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            max-width: 450px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { color: #001f3f; text-align: center; font-style: italic; font-family: "Playfair Display", serif; }
        p  { color: #555; line-height: 1.6; text-align: center; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #001f3f; font-weight: bold; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 8px; margin-bottom: 10px;
            border: 1px solid #bbb; border-radius: 4px;
            font-family: Arial, sans-serif; font-size: 14px;
        }
        button {
            background-color: #001f3f; color: white;
            padding: 10px 20px; margin-right: 10px; margin-top: 20px;
            border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        button:hover { background-color: #003d7a; }
        button.reset { background-color: #95a5a6; }
        button.reset:hover { background-color: #7f8c8d; }

        .message {
            padding: 12px; border-radius: 4px; margin-top: 15px;
            text-align: center; font-weight: bold; display: none;
        }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error   { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .register-link { text-align: center; margin-top: 20px; color: #555; }
        .register-link a { color: #001f3f; text-decoration: none; font-weight: bold; }
        .register-link a:hover { text-decoration: underline; }
        img { display: block; margin: 0 auto 20px; width: 80px; height: auto; }
    </style>
</head>
<body>
<div class="container">
    <img src="image1.jpg" alt="State emblem of India">
    <h2>Internship Portal Login</h2>
    <p>Please enter your <strong>username</strong> and <strong>password</strong> to continue.</p>

    <div class="message" id="message"></div>

    <form id="loginForm">
        <label for="username"><b>Username:</b></label>
        <input type="text" id="username" name="username" required>

        <label for="password"><b>Password:</b></label>
        <input type="password" id="password" name="password" required>

        <button type="submit" id="submitBtn">Login</button>
        <button type="button" class="reset" onclick="document.getElementById('loginForm').reset()">Reset</button>
    </form>

    <div class="register-link">
        <p>New user? <a href="Registration.html">Create a new account</a>.</p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        const formData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (data.success) {
                // Save user info in browser storage so other pages can use it
                localStorage.setItem('loggedInUser', JSON.stringify(data.user));

                showMessage('Login successful! Redirecting...', 'success');

                // Redirect admin to admin panel, students to dashboard
                setTimeout(() => {
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'Successful_reg.html';
                    }
                }, 1500);
            } else {
                showMessage(data.message, 'error');
            }

        } catch (error) {
            showMessage('Cannot connect to server. Make sure the server is running.', 'error');
        }

        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
    });

    function showMessage(text, type) {
        const box = document.getElementById('message');
        box.textContent = text;
        box.className = 'message ' + type;
        box.style.display = 'block';
    }
</script>
</body>
</html>
